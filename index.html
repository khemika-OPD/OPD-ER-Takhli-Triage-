<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takhli OPD Triage Tool</title>
    <style>
        :root { --red: #ff4d4d; --pink: #ff99cc; --yellow: #ffff66; --green: #99ff99; --white: #ffffff; }
        body { font-family: 'Sarabun', sans-serif; padding: 15px; background-color: #e9ecef; }
        .card { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        h2 { text-align: center; color: #1a3a5a; border-bottom: 2px solid #1a3a5a; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-top: 10px; color: #34495e; }
        input, select { width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 8px; box-sizing: border-box; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-top: 10px; background: #f8f9fa; padding: 10px; border-radius: 8px; }
        button { width: 100%; padding: 15px; background-color: #2980b9; color: white; border: none; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background-color: #1f6391; }
        #result-box { margin-top: 20px; padding: 25px; border-radius: 12px; text-align: center; display: none; border: 2px solid #ddd; }
        .result-title { font-size: 28px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>คัดกรองผู้ป่วย (รพ.ตาคลี Model)</h2>

    <!-- ระดับ 1-2: อาการนำ -->
    <label>🚨 อาการนำ (Chief Complaint)</label>
    <select id="symptom">
        <option value="none">-- ไม่มีอาการฉุกเฉินชัดเจน --</option>
        <option value="lv1">ระดับ 1: CPR / GCS<8 / Shock / BP ≥220/130 / NEWS >= 5</option>
        <option value="lv2">ระดับ 2: Fast Track Stroke/STEMI / เจ็บอก / เลือดออก Active / Pain >= 7</option>
        <option value="lv2">ระดับ 2: สัตว์มีพิษกัด / สารพิษ / ล่วงละเมิด / จิตเวชก้าวร้าว</option>
    </select>

    <!-- สัญญาณชีพ -->
    <label>📊 สัญญาณชีพ (Vital Signs)</label>
    <div class="grid">
        <div>
            <label>อายุ</label>
            <select id="age">
                <option value="adult">ผู้ใหญ่ (>8 ปี)</option>
                <option value="child_8">เด็ก (3-8 ปี)</option>
                <option value="child_3">เด็ก (3 เดือน-3 ปี)</option>
                <option value="infant">ทารก (<3 เดือน)</option>
            </select>
        </div>
        <div><label>SpO2 (%)</label><input type="number" id="spo2" placeholder="เช่น 98"></div>
        <div><label>HR (ชีพจร)</label><input type="number" id="hr" placeholder="เช่น 80"></div>
        <div><label>RR (หายใจ)</label><input type="number" id="rr" placeholder="เช่น 20"></div>
        <div><label>SBP (บน)</label><input type="number" id="sbp" placeholder="เช่น 120"></div>
        <div><label>Temp (°C)</label><input type="number" id="temp" placeholder="เช่น 37"></div>
    </div>

    <!-- กิจกรรม/Resources -->
    <label>🛠️ กิจกรรม/Resources (Lab, Imaging, IV, หัตถการ)</label>
    <select id="resources">
        <option value="0">0 อย่าง (ตรวจร่างกายอย่างเดียว/รับยาเดิม)</option>
        <option value="1">1 อย่าง (เช่น เจาะเลือด หรือ X-ray อย่างเดียว)</option>
        <option value="2">มากกว่า 1 อย่าง</option>
    </select>

    <div class="checkbox-group">
        <input type="checkbox" id="panicLab">
        <label for="panicLab">พบผล Lab ผิดปกติวิกฤต (Panic Value)</label>
    </div>

    <button onclick="processTriage()">คัดแยกผู้ป่วย</button>

    <div id="result-box">
        <div id="res-title" class="result-title"></div>
        <div id="res-desc"></div>
    </div>
</div>

<script>
function processTriage() {
    const sym = document.getElementById('symptom').value;
    const age = document.getElementById('age').value;
    const hr = parseInt(document.getElementById('hr').value) || 0;
    const rr = parseInt(document.getElementById('rr').value) || 0;
    const spo2 = parseInt(document.getElementById('spo2').value) || 100;
    const sbp = parseInt(document.getElementById('sbp').value) || 120;
    const temp = parseFloat(document.getElementById('temp').value) || 36.5;
    const res = document.getElementById('resources').value;
    const panic = document.getElementById('panicLab').checked;

    let level = 5;
    let color = 'white';
    let zone = "อาคาร OPD";

    // 1. ตรวจ Level 1 (แดง)
    if (sym === "lv1" || spo2 < 90) {
        level = 1; color = 'var(--red)'; zone = "ห้องฉุกเฉิน (Resuscitation)";
    } 
    // 2. ตรวจ Level 2 (ชมพู) - เสี่ยง ซึม ปวด หรือ Danger Zone VS
    else if (sym === "lv2" || spo2 < 95 || 
            (age==="adult" && (hr>100 || rr>20)) || 
            (age==="child_8" && (hr>140 || rr>30)) ||
            (age==="child_3" && (hr>160 || rr>40)) ||
            (age==="infant" && (hr>180 || rr>50))) {
        level = 2; color = 'var(--pink)'; zone = "ห้องฉุกเฉิน (Emergency)";
    }
    // 3. ตรวจ Level 3 (เหลือง) - VS ผิดปกติ หรือ Panic Lab
    else if (panic || hr >= 120 || hr < 50 || sbp >= 180 || temp > 39 || res === "2") {
        level = 3; color = 'var(--yellow)'; zone = "OPD Fast Track / คิวเร่งด่วน";
    }
    // 4. ระดับ 4-5 ตาม Resource
    else if (res === "1") {
        level = 4; color = 'var(--green)'; zone = "ตรวจตามคิวปกติ (Semi-Urgent)";
    } else {
        level = 5; color = 'var(--white)'; zone = "ตรวจตามคิวปกติ (Non-Urgent)";
    }

    const box = document.getElementById('result-box');
    box.style.display = 'block';
    box.style.backgroundColor = color;
    document.getElementById('res-title').innerText = "ระดับ " + level;
    document.getElementById('res-desc').innerText = "ส่งตัวไปที่: " + zone;
}
</script>
</body>
</html>
