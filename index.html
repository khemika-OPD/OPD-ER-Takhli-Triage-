<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takhli Triage Tool - Khemika</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff4d4d; --pink: #ff85a2; --yellow: #ffcc00; --green: #2ecc71; --white: #ffffff; --dark: #1a3a5a; }
        body { font-family: 'Sarabun', sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        .triage-card { max-width: 550px; margin: auto; background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        .header { background: var(--dark); color: white; padding: 25px 15px; text-align: center; position: relative; }
        .content { padding: 20px; min-height: 400px; }
        .group-title { font-weight: bold; color: var(--dark); border-left: 5px solid #ff4757; padding-left: 10px; margin-bottom: 15px; }
        
        /* Checklist Styling */
        .check-item { display: block; background: #f9f9f9; padding: 12px; margin-bottom: 8px; border-radius: 12px; border: 1px solid #eee; cursor: pointer; font-size: 0.9rem; }
        .check-item input { margin-right: 10px; transform: scale(1.2); }
        
        /* V/S Lab Style Table */
        .vs-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        .vs-table th, .vs-table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .vs-table th { background: #f0f2f5; color: #555; }
        input[type="number"] { width: 80%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; text-align: center; font-size: 1rem; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 15px; font-size: 1rem; cursor: pointer; font-family: 'Sarabun'; font-weight: bold; transition: 0.2s; }
        .btn-back { background: #bdc3c7; color: #333; }
        .btn-next { background: var(--dark); color: white; }
        .btn-pink-res { background: #d63384; color: white; width: 100%; margin-top: 10px; }

        .result-screen { text-align: center; padding: 30px 15px; }
        .qr-section { margin-top: 20px; padding: 15px; border-top: 1px dashed #ccc; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="triage-card">
    <div class="header" id="header">
        <h2 style="margin:0;">Triage Takhli Digital</h2>
        <p style="margin:5px 0 0; font-size: 0.8rem; opacity: 0.9;">Khemika Pongsri | Senior Nurse</p>
    </div>

    <div class="content">
        <!-- Step 1: สีแดง (ระดับ 1) -->
        <div id="step_red">
            <div class="group-title">🚨 ระดับ 1: ภาวะวิกฤต (Red Zone)</div>
            <div id="red_checklist">
                <label class="check-item"><input type="checkbox" value="red"> CPR / ET Tube / ICD insertion</label>
                <label class="check-item"><input type="checkbox" value="red"> หมดสติ / GCS < 8 / ชักเกร็ง</label>
                <label class="check-item"><input type="checkbox" value="red"> Shock (SBP < 90 / MAP < 65)</label>
                <label class="check-item"><input type="checkbox" value="red"> O2 Sat < 90%</label>
                <label class="check-item"><input type="checkbox" value="red"> BP ≥ 220/130 mmHg</label>
                <label class="check-item"><input type="checkbox" value="red"> NEW Score ≥ 5 (หรือข้อเดียว ≥ 3)</label>
            </div>
            <div class="btn-group">
                <button class="btn-next" onclick="checkRed()">ตรวจสอบระดับถัดไป (สีชมพู)</button>
            </div>
        </div>

        <!-- Step 2: สีชมพู (ระดับ 2) -->
        <div id="step_pink" class="hidden">
            <div class="group-title">💓 ระดับ 2: ภาวะเสี่ยงสูง (Pink Zone)</div>
            <div style="max-height: 300px; overflow-y: auto; padding-right: 5px;">
                <label class="check-item"><input type="checkbox" value="pink"> Fast track Stroke / STEMI / Chest Pain</label>
                <label class="check-item"><input type="checkbox" value="pink"> อาเจียน / ถ่าย / ไอ เป็นเลือด (Active)</label>
                <label class="check-item"><input type="checkbox" value="pink"> Pain Score ≥ 7 + V/S ผิดปกติ</label>
                <label class="check-item"><input type="checkbox" value="pink"> HR ≥ 120 หรือ ≤ 70 + หน้ามืด/วูบ/ความดันตก</label>
                <label class="check-item"><input type="checkbox" value="pink"> BP ≥ 180/100 + ตามัว/อ่อนแรง/เจ็บหน้าอก/พูดไม่ชัด</label>
                <label class="check-item"><input type="checkbox" value="pink"> อุบัติเหตุ / สัตว์พิษกัด / สัตว์เลี้ยงลูกด้วยนมกัด (ใน 24 ชม.)</label>
                <label class="check-item"><input type="checkbox" value="pink"> หญิงตั้งครรภ์ < 26 สัปดาห์ (ส่ง ER)</label>
                <label class="check-item"><input type="checkbox" value="pink"> หญิงตั้งครรภ์ ≥ 26 สัปดาห์ (ส่งห้องคลอด)</label>
                <label class="check-item"><input type="checkbox" value="pink"> ผู้ป่วยคดี / ผู้ป่วยจิตเวชคลุ้มคลั่ง</label>
                <label class="check-item"><input type="checkbox" value="pink"> เบาหวาน FBS ≤ 70 หรือ HI</label>
            </div>
            <div class="btn-group">
                <button class="btn-back" onclick="nav('step_red', 'var(--dark)')">ย้อนกลับ</button>
                <button class="btn-next" onclick="checkPink()">ตรวจสอบ Vital Signs</button>
            </div>
        </div>

        <!-- Step 3: Vital Signs (Lab Style) -->
        <div id="step_vs" class="hidden">
            <div class="group-title">📊 ตรวจสอบ Vital Signs (V/S)</div>
            <div style="margin-bottom: 15px;">
                <label>ระบุช่วงอายุ:</label>
                <select id="age_range" style="width:100%; padding:10px; border-radius:10px;" onchange="updateVSLimits()">
                    <option value="baby"> < 3 เดือน </option>
                    <option value="toddler"> 3 เดือน - 3 ปี </option>
                    <option value="child"> 3 - 8 ปี </option>
                    <option value="adult" selected> > 8 ปี </option>
                </select>
            </div>
            <table class="vs-table">
                <tr><th>Parameter</th><th>Value</th><th>Limit</th></tr>
                <tr><td>PR (bpm)</td><td><input type="number" id="vs_hr"></td><td id="limit_hr">> 100</td></tr>
                <tr><td>RR (/min)</td><td><input type="number" id="vs_rr"></td><td id="limit_rr">> 20</td></tr>
                <tr><td>O2 Sat (%)</td><td><input type="number" id="vs_o2"></td><td>< 95%</td></tr>
            </table>
            <div class="btn-group">
                <button class="btn-back" onclick="nav('step_pink', '#ff85a2')">ย้อนกลับ</button>
                <button class="btn-next" onclick="validateVS()">ตรวจสอบผล Lab (เหลือง)</button>
            </div>
        </div>

        <!-- Step 4: สีเหลือง (ระดับ 3) -->
        <div id="step_yellow" class="hidden">
            <div class="group-title">🟡 ระดับ 3: Lab วิกฤต (Yellow Zone)</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <label class="check-item"><input type="checkbox"> FBS ≤ 55 หรือ ≥ 400</label>
                <label class="check-item"><input type="checkbox"> Na ≤ 120 หรือ ≥ 160</label>
                <label class="check-item"><input type="checkbox"> K ≤ 2.5 หรือ ≥ 6</label>
                <label class="check-item"><input type="checkbox"> Hct ≤ 20%</label>
                <label class="check-item"><input type="checkbox"> Platelet วิกฤต</label>
                <label class="check-item"><input type="checkbox"> WBC ≤ 2k หรือ ≥ 30k</label>
            </div>
            <div class="btn-group">
                <button class="btn-back" onclick="nav('step_vs', '#ffcc00')">ย้อนกลับ</button>
                <button class="btn-next" onclick="checkYellow()">ตรวจสอบกิจกรรม (เขียว/ขาว)</button>
            </div>
        </div>

        <!-- ผลลัพธ์สุดท้าย -->
        <div id="step_result" class="hidden">
            <div class="result-screen">
                <div id="res_badge" style="padding:40px; border-radius:25px; font-size:2rem; font-weight:bold; border:5px solid;"></div>
                <p id="res_text" style="margin-top:20px; font-weight:bold; color:#333;"></p>
                <button class="btn-next" style="width:80%; margin-top:20px;" onclick="location.reload()">คัดกรองใหม่</button>
            </div>
            <div class="qr-section">
                <div id="qrcode" style="display:flex; justify-content:center; margin-bottom:10px;"></div>
                <p style="font-size:0.7rem; color:#888;">Scan to Share Triage App</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    function nav(id, color) {
        document.querySelectorAll('.content > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('header').style.background = color;
    }

    function checkRed() {
        const checked = document.querySelectorAll('#red_checklist input:checked').length;
        if (checked > 0) finalize('แดง', 'ระดับ 1: Resuscitation (ส่ง ER ทันที)');
        else nav('step_pink', '#ff85a2');
    }

    function checkPink() {
        const checked = document.querySelectorAll('#step_pink input:checked').length;
        if (checked > 0) finalize('ชมพู', 'ระดับ 2: Emergency (ส่งห้องฉุกเฉิน)');
        else nav('step_vs', '#ffcc00');
    }

    function updateVSLimits() {
        const age = document.getElementById('age_range').value;
        const limits = { baby: [180, 50], toddler: [160, 40], child: [140, 30], adult: [100, 20] };
        document.getElementById('limit_hr').innerText = "> " + limits[age][0];
        document.getElementById('limit_rr').innerText = "> " + limits[age][1];
    }

    function validateVS() {
        const age = document.getElementById('age_range').value;
        const hr = parseInt(document.getElementById('vs_hr').value) || 0;
        const rr = parseInt(document.getElementById('vs_rr').value) || 0;
        const o2 = parseInt(document.getElementById('vs_o2').value) || 100;
        const limits = { baby: [180, 50], toddler: [160, 40], child: [140, 30], adult: [100, 20] };
        
        if (hr > limits[age][0] || rr > limits[age][1] || o2 < 95) {
            finalize('ชมพู', 'ระดับ 2: Emergency (Vital Signs วิกฤต)');
        } else {
            nav('step_yellow', '#ffcc00');
        }
    }

    function checkYellow() {
        const checked = document.querySelectorAll('#step_yellow input:checked').length;
        if (checked > 0) finalize('เหลือง', 'ระดับ 3: Urgent (OPD Fast Track)');
        else finalize('เขียว/ขาว', 'ระดับ 4-5: ตรวจสอบจำนวน Resources (1 อย่าง = เขียว, 0 อย่าง = ขาว)');
    }

    function finalize(color, text) {
        const bg = { 'แดง': '#ff4d4d', 'ชมพู': '#ff85a2', 'เหลือง': '#ffcc00', 'เขียว/ขาว': '#2ecc71' };
        nav('step_result', bg[color]);
        const badge = document.getElementById('res_badge');
        badge.innerText = "สี" + color;
        badge.style.borderColor = "#fff";
        badge.style.color = "#fff";
        document.getElementById('res_text').innerText = text;
        
        if (!document.getElementById("qrcode").innerHTML) {
            new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 120, height: 120 });
        }
    }
</script>

</body>
</html>
